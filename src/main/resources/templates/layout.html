    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Tel Health | Clinical Precision Redefined</title>

                        "inverse-primary": "#b4c5ff",
                        "success": "#16A34A",
                        "surface-container-highest": "#e0e3e5",
                        "surface-muted": "#F1F5F9",
                        "text-secondary": "#475569",
                        "tertiary": "#46566c",
                        "surface-container-high": "#e6e8ea",
                        "primary-container": "#2563eb",
                        "surface-container-low": "#f2f4f6",
                        "on-tertiary-fixed-variant": "#38485d",
                        "on-surface-variant": "#434655",
                        "background": "#f7f9fb",
                        "secondary-container": "#6df5e1",
                        "on-secondary-fixed": "#00201c",
                        "on-tertiary-container": "#e9f0ff",
                        "surface": "#f7f9fb",
                        "danger": "#DC2626",
                        "primary-fixed": "#dbe1ff",
                        "on-secondary-fixed-variant": "#005048",
                        "tertiary-fixed-dim": "#b7c8e1",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#eff1f3",
                        "secondary-fixed": "#71f8e4",

                        "inverse-surface": "#2d3133",

                        "tertiary-container": "#5e6e85",
                        "text-primary": "#0F172A",
                        "secondary-fixed-dim": "#4fdbc8",
                        "surface-tint": "#0053db",
                        "border-base": "#E2E8F0",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-primary": "#ffffff",

                    },
                    "borderRadius": {

    </script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/ws.js"></script>
    <script src="https://unpkg.com/hyperscript.org@0.9.14/dist/_hyperscript.min.js"></script>
    <!-- CSRF token for HTMX requests -->
    <meta name="_csrf" th:content="${_csrf.token}" />
    <meta name="_csrf_header" th:content="${_csrf.headerName}" />

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .sidebar-gradient {
            background: linear-gradient(180deg, #2563EB 0%, #1D4ED8 100%);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .sidebar-item-active { background-color: rgba(255, 255, 255, 0.15); box-shadow: inset 4px 0 0 #ffffff; }
    </style>
</head>
<body class="overflow-hidden flex h-screen text-on-surface">

<!-- SIDEBAR -->
<div th:replace="~{/sidebar :: sidebar}" />

<!-- MAIN CONTENT WRAPPER -->
<main class="flex-1 flex flex-col h-full bg-background overflow-hidden relative">
    <div layout:fragment="content" id="content"></div>
</main>
<script>
    // Active Navigation Logic
    document.querySelectorAll('nav a').forEach(item => {
        item.addEventListener('click', function(e) {
            if(this.closest('#main-sidebar')) {
                document.querySelectorAll('#main-sidebar a').forEach(nav => nav.classList.remove('sidebar-item-active'));
                this.classList.add('sidebar-item-active');
            }
        });
    });
    // Configure HTMX to send CSRF header automatically
    (function() {
        const tokenMeta = document.querySelector('meta[name="_csrf"]');
        const headerMeta = document.querySelector('meta[name="_csrf_header"]');
        if (tokenMeta && headerMeta && window.htmx) {
            const token = tokenMeta.getAttribute('content');
            const headerName = headerMeta.getAttribute('content');
            htmx.on('htmx:configRequest', (evt) => {
                evt.detail.headers[headerName] = token;
            });
        }
    })();
</script>

</body>
</html>
