<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head><meta charset="utf-8"><title>Appointments | Tel Health</title></head>
<body><div layout:fragment="content" class="flex h-full min-h-0 min-w-0 flex-col md:pl-sidebar-width"><main class="flex-1 min-h-0 w-full overflow-y-auto overflow-x-hidden px-md py-md md:px-lg"><section class="mx-auto flex w-full max-w-[1080px] flex-col gap-md text-small">
  <header class="flex justify-between gap-md"><div><h1 class="text-[22px] font-semibold text-text-primary">Appointment Status</h1><p class="text-small text-text-secondary">View booked, checked-in, cancelled, and completed appointments.</p></div><a th:href="@{/patient/appointments/new}" class="h-fit rounded-md bg-primary px-md py-sm font-semibold text-white">Book Appointment</a></header>
  <div th:if="${successMessage}" class="rounded-md border border-success/20 bg-success/10 px-md py-sm font-semibold text-success" th:text="${successMessage}">Booked.</div>
  <section class="rounded-lg border border-border-base bg-white shadow-sm"><div class="max-h-[calc(100vh-220px)] overflow-auto"><table class="w-full min-w-[840px] text-left text-small"><thead class="sticky top-0 bg-surface-muted text-caption uppercase text-text-secondary"><tr><th class="px-md py-sm">Date</th><th class="px-md py-sm">Provider</th><th class="px-md py-sm">Department</th><th class="px-md py-sm">Reason</th><th class="px-md py-sm">Status</th></tr></thead><tbody class="divide-y divide-border-base"><tr th:each="appointment : ${appointments}"><td class="px-md py-sm" th:text="${appointment.scheduledAt != null ? #temporals.format(appointment.scheduledAt, 'dd MMM yyyy hh:mm a') : '-'}">Date</td><td class="px-md py-sm" th:text="${appointment.provider ?: 'Provider pending'}">Provider</td><td class="px-md py-sm" th:text="${appointment.department ?: 'OPD'}">Dept</td><td class="px-md py-sm text-text-secondary" th:text="${appointment.reason ?: '-'}">Reason</td><td class="px-md py-sm"><span class="rounded-full bg-primary/10 px-sm py-[2px] text-caption font-bold text-primary" th:text="${appointment.status ?: 'BOOKED'}">BOOKED</span></td></tr><tr th:if="${#lists.isEmpty(appointments)}"><td colspan="5" class="px-md py-lg text-center text-text-secondary">No appointments found.</td></tr></tbody></table></div></section>
</section></main></div></body></html>
