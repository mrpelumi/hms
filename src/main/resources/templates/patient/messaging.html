<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head><meta charset="utf-8"><title>Message Care Team | Tel Health</title></head>
<body><div layout:fragment="content" class="flex h-full min-h-0 min-w-0 flex-col md:pl-sidebar-width"><main class="flex-1 min-h-0 w-full overflow-y-auto overflow-x-hidden px-md py-md md:px-lg"><section class="mx-auto flex w-full max-w-[980px] flex-col gap-md text-small">
  <header><h1 class="text-[22px] font-semibold text-text-primary">Message Care Team</h1><p class="text-small text-text-secondary">Send non-emergency messages to your care team. For emergencies, attend the hospital or call emergency services.</p></header>
  <div th:if="${successMessage}" class="rounded-md border border-success/20 bg-success/10 px-md py-sm font-semibold text-success" th:text="${successMessage}">Sent.</div>
  <section class="grid grid-cols-1 gap-md lg:grid-cols-3"><form class="rounded-lg border border-border-base bg-white p-md shadow-sm" method="post" th:action="@{/patient/messages}"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><h2 class="text-base font-semibold text-text-primary">New Message</h2><div class="mt-sm space-y-sm"><label class="block space-y-xs"><span class="text-caption font-bold uppercase text-text-secondary">Subject</span><input name="subject" class="w-full rounded-md border border-border-base p-sm text-small" required></label><label class="block space-y-xs"><span class="text-caption font-bold uppercase text-text-secondary">Message</span><textarea name="message" rows="6" class="w-full rounded-md border border-border-base p-sm text-small" required></textarea></label><button class="w-full rounded-md bg-primary px-md py-sm font-semibold text-white" type="submit">Send Message</button></div></form>
  <article class="rounded-lg border border-border-base bg-white shadow-sm lg:col-span-2"><div class="border-b border-border-base p-md"><h2 class="text-base font-semibold text-text-primary">Message History</h2></div><div class="max-h-[calc(100vh-280px)] overflow-auto p-md"><div th:each="message : ${messages}" class="mb-sm rounded-md bg-surface-muted p-sm"><div class="flex items-center justify-between gap-sm"><p class="font-semibold text-text-primary" th:text="${message.subject}">Subject</p><span class="rounded-full bg-primary/10 px-sm py-[2px] text-caption font-bold text-primary" th:text="${message.status}">SENT</span></div><p class="mt-xs whitespace-pre-line text-caption text-text-secondary" th:text="${message.message}">Message</p><p class="mt-xs text-caption text-text-secondary" th:text="${message.createdAt != null ? #temporals.format(message.createdAt, 'dd MMM yyyy hh:mm a') : '-'}">Date</p></div><p th:if="${#lists.isEmpty(messages)}" class="text-center text-text-secondary">No messages sent yet.</p></div></article></section>
</section></main></div></body></html>
