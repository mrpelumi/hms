<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head><meta charset="utf-8"><title>Lab and Radiology Reports | Tel Health</title></head>
<body><div layout:fragment="content" class="flex h-full min-h-0 min-w-0 flex-col md:pl-sidebar-width"><main class="flex-1 min-h-0 w-full overflow-y-auto overflow-x-hidden px-md py-md md:px-lg"><section class="mx-auto flex w-full max-w-[1080px] flex-col gap-md text-small">
  <header><h1 class="text-[22px] font-semibold text-text-primary">Lab and Radiology Reports</h1><p class="text-small text-text-secondary">Download reports when laboratory or radiology results are ready.</p></header>
  <section class="rounded-lg border border-border-base bg-white shadow-sm"><div class="max-h-[calc(100vh-220px)] overflow-auto"><table class="w-full min-w-[860px] text-left text-small"><thead class="sticky top-0 bg-surface-muted text-caption uppercase text-text-secondary"><tr><th class="px-md py-sm">Date</th><th class="px-md py-sm">Type</th><th class="px-md py-sm">Test</th><th class="px-md py-sm">Status</th><th class="px-md py-sm">Patient Note</th><th class="px-md py-sm text-right">Action</th></tr></thead><tbody class="divide-y divide-border-base"><tr th:each="report : ${investigations}"><td class="px-md py-sm" th:text="${report.createdAt != null ? #temporals.format(report.createdAt, 'dd MMM yyyy') : '-'}">Date</td><td class="px-md py-sm" th:text="${report.requestType ?: '-'}">Type</td><td class="px-md py-sm font-semibold" th:text="${report.testName ?: '-'}">Test</td><td class="px-md py-sm"><span class="rounded-full bg-primary/10 px-sm py-[2px] text-caption font-bold text-primary" th:text="${report.status ?: 'REQUESTED'}">REQUESTED</span></td><td class="px-md py-sm text-text-secondary" th:text="${report.patientUpdateNote ?: '-'}">Note</td><td class="px-md py-sm text-right"><a th:if="${report.status == 'RESULT_READY'}" th:href="@{/patient/reports/{id}/download(id=${report.id})}" class="rounded-md border border-primary px-sm py-xs text-caption font-bold text-primary">Download</a><span th:if="${report.status != 'RESULT_READY'}" class="text-caption text-text-secondary">Pending</span></td></tr><tr th:if="${#lists.isEmpty(investigations)}"><td colspan="6" class="px-md py-lg text-center text-text-secondary">No lab or radiology requests yet.</td></tr></tbody></table></div></section>
</section></main></div></body></html>
