<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head><meta charset="utf-8"><title>Consultation Records | Tel Health</title></head>
<body><div layout:fragment="content" class="flex h-full min-h-0 min-w-0 flex-col md:pl-sidebar-width"><main class="flex-1 min-h-0 w-full overflow-y-auto overflow-x-hidden px-md py-md md:px-lg"><section class="mx-auto flex w-full max-w-[1080px] flex-col gap-md text-small">
  <header><h1 class="text-[22px] font-semibold text-text-primary">Consultation Records</h1><p class="text-small text-text-secondary">Review completed and in-progress doctor consultation notes.</p></header>
  <section class="rounded-lg border border-border-base bg-white shadow-sm"><div class="max-h-[calc(100vh-220px)] overflow-auto"><table class="w-full min-w-[900px] text-left text-small"><thead class="sticky top-0 bg-surface-muted text-caption uppercase text-text-secondary"><tr><th class="px-md py-sm">Date</th><th class="px-md py-sm">Status</th><th class="px-md py-sm">Symptoms</th><th class="px-md py-sm">Diagnosis</th><th class="px-md py-sm">Plan</th><th class="px-md py-sm">Follow-up</th></tr></thead><tbody class="divide-y divide-border-base"><tr th:each="consultation : ${consultations}"><td class="px-md py-sm" th:text="${consultation.consultationAt != null ? #temporals.format(consultation.consultationAt, 'dd MMM yyyy hh:mm a') : '-'}">Date</td><td class="px-md py-sm"><span class="rounded-full bg-primary/10 px-sm py-[2px] text-caption font-bold text-primary" th:text="${consultation.status ?: 'IN_PROGRESS'}">Status</span></td><td class="px-md py-sm text-text-secondary" th:text="${consultation.symptoms ?: '-'}">Symptoms</td><td class="px-md py-sm text-text-secondary" th:text="${consultation.diagnosis ?: '-'}">Diagnosis</td><td class="px-md py-sm text-text-secondary" th:text="${consultation.treatmentPlan ?: '-'}">Plan</td><td class="px-md py-sm text-text-secondary" th:text="${consultation.followUpDate ?: '-'}">Follow-up</td></tr><tr th:if="${#lists.isEmpty(consultations)}"><td colspan="6" class="px-md py-lg text-center text-text-secondary">No consultation records yet.</td></tr></tbody></table></div></section>
</section></main></div></body></html>
