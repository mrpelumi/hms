<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head><meta charset="utf-8"><title>Prescriptions | Tel Health</title></head>
<body><div layout:fragment="content" class="flex h-full min-h-0 min-w-0 flex-col md:pl-sidebar-width"><main class="flex-1 min-h-0 w-full overflow-y-auto overflow-x-hidden px-md py-md md:px-lg"><section class="mx-auto flex w-full max-w-[1080px] flex-col gap-md text-small">
  <header><h1 class="text-[22px] font-semibold text-text-primary">Prescriptions</h1><p class="text-small text-text-secondary">View medications created during consultations and pharmacy dispense status.</p></header>
  <section class="rounded-lg border border-border-base bg-white shadow-sm"><div class="max-h-[calc(100vh-220px)] overflow-auto"><table class="w-full min-w-[860px] text-left text-small"><thead class="sticky top-0 bg-surface-muted text-caption uppercase text-text-secondary"><tr><th class="px-md py-sm">Date</th><th class="px-md py-sm">Medication</th><th class="px-md py-sm">Dosage</th><th class="px-md py-sm">Frequency</th><th class="px-md py-sm">Duration</th><th class="px-md py-sm">Status</th></tr></thead><tbody class="divide-y divide-border-base"><tr th:each="prescription : ${prescriptions}"><td class="px-md py-sm" th:text="${prescription.createdAt != null ? #temporals.format(prescription.createdAt, 'dd MMM yyyy') : '-'}">Date</td><td class="px-md py-sm font-semibold" th:text="${prescription.medicationName}">Medication</td><td class="px-md py-sm" th:text="${prescription.dosage ?: '-'}">Dosage</td><td class="px-md py-sm" th:text="${prescription.frequency ?: '-'}">Frequency</td><td class="px-md py-sm" th:text="${prescription.duration ?: '-'}">Duration</td><td class="px-md py-sm"><span class="rounded-full bg-primary/10 px-sm py-[2px] text-caption font-bold text-primary" th:text="${prescription.status ?: 'PENDING'}">PENDING</span></td></tr><tr th:if="${#lists.isEmpty(prescriptions)}"><td colspan="6" class="px-md py-lg text-center text-text-secondary">No prescriptions yet.</td></tr></tbody></table></div></section>
</section></main></div></body></html>
