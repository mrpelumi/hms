<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">
<head><meta charset="utf-8"><title>Billing | Tel Health</title></head>
<body><div layout:fragment="content" class="flex h-full min-h-0 min-w-0 flex-col md:pl-sidebar-width"><main class="flex-1 min-h-0 w-full overflow-y-auto overflow-x-hidden px-md py-md md:px-lg"><section class="mx-auto flex w-full max-w-[1080px] flex-col gap-md text-small">
  <header><h1 class="text-[22px] font-semibold text-text-primary">Bills and Payments</h1><p class="text-small text-text-secondary">View bills raised from consultations, prescriptions, laboratory, and radiology services.</p></header>
  <div th:if="${successMessage}" class="rounded-md border border-success/20 bg-success/10 px-md py-sm font-semibold text-success" th:text="${successMessage}">Paid.</div>
  <section class="grid grid-cols-1 gap-sm md:grid-cols-2"><article class="rounded-lg border border-border-base bg-white p-md shadow-sm"><p class="text-caption font-bold uppercase text-text-secondary">Outstanding</p><p class="mt-xs text-[24px] font-semibold text-danger" th:text="${outstandingTotal}">0.00</p></article><article class="rounded-lg border border-border-base bg-white p-md shadow-sm"><p class="text-caption font-bold uppercase text-text-secondary">Unpaid Bills</p><p class="mt-xs text-[24px] font-semibold text-text-primary" th:text="${outstandingCount}">0</p></article></section>
  <section class="rounded-lg border border-border-base bg-white shadow-sm"><div class="max-h-[calc(100vh-300px)] overflow-auto"><table class="w-full min-w-[860px] text-left text-small"><thead class="sticky top-0 bg-surface-muted text-caption uppercase text-text-secondary"><tr><th class="px-md py-sm">Date</th><th class="px-md py-sm">Description</th><th class="px-md py-sm">Type</th><th class="px-md py-sm">Amount</th><th class="px-md py-sm">Status</th><th class="px-md py-sm text-right">Action</th></tr></thead><tbody class="divide-y divide-border-base"><tr th:each="bill : ${bills}"><td class="px-md py-sm" th:text="${bill.createdAt != null ? #temporals.format(bill.createdAt, 'dd MMM yyyy') : '-'}">Date</td><td class="px-md py-sm font-semibold" th:text="${bill.description ?: 'Clinical charge'}">Charge</td><td class="px-md py-sm" th:text="${bill.sourceType ?: '-'}">Type</td><td class="px-md py-sm" th:text="${bill.totalAmount}">0.00</td><td class="px-md py-sm"><span class="rounded-full px-sm py-[2px] text-caption font-bold" th:classappend="${bill.status == 'PAID'} ? ' bg-success/10 text-success' : ' bg-danger/10 text-danger'" th:text="${bill.status ?: 'UNPAID'}">UNPAID</span></td><td class="px-md py-sm text-right"><form th:if="${bill.status != 'PAID'}" method="post" th:action="@{/patient/billing/{id}/pay(id=${bill.id})}"><input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"><button class="rounded-md bg-primary px-sm py-xs text-caption font-bold text-white" type="submit">Pay</button></form><span th:if="${bill.status == 'PAID'}" class="text-caption text-success">Paid</span></td></tr><tr th:if="${#lists.isEmpty(bills)}"><td colspan="6" class="px-md py-lg text-center text-text-secondary">No bills yet.</td></tr></tbody></table></div></section>
</section></main></div></body></html>
