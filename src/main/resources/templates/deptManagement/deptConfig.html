<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="utf-8">
    <title>Department Resources | Tel Health</title>
</head>
<body>
<div layout:fragment="content" class="flex h-full min-h-0 min-w-0 flex-col md:pl-sidebar-width">
    <main class="flex-1 min-h-0 w-full overflow-y-auto overflow-x-hidden px-md py-md md:px-lg">
        <section class="mx-auto flex w-full max-w-[1080px] flex-col gap-md text-small">
            <header>
                <nav class="mb-xs flex items-center gap-xs text-caption text-text-secondary">
                    <a class="hover:text-primary" th:href="@{/department-management/dashboard}">Department Admin</a>
                    <span class="material-symbols-outlined text-[14px]">chevron_right</span>
                    <span class="font-bold text-primary">Resources</span>
                </nav>
                <h1 class="text-[22px] leading-7 font-semibold text-text-primary">Manage Department Resources</h1>
                <p class="text-small text-text-secondary">Record resource status, stock pressure, equipment concerns, and operational notes.</p>
            </header>

            <div th:if="${successMessage}" class="rounded-md border border-success/20 bg-success/10 px-md py-sm font-semibold text-success" th:text="${successMessage}">Saved.</div>

            <section class="grid grid-cols-1 gap-md lg:grid-cols-3">
                <form class="rounded-lg border border-border-base bg-white p-md shadow-sm lg:col-span-1" method="post" th:action="@{/department-management/resources}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <h2 class="text-base font-semibold text-text-primary">Resource Update</h2>
                    <div class="mt-sm space-y-sm">
                        <label class="block space-y-xs">
                            <span class="text-caption font-bold uppercase text-text-secondary">Department</span>
                            <select name="departmentId" class="w-full rounded-md border border-border-base p-sm text-small" required>
                                <option th:each="department : ${managedDepartments}" th:value="${department.id}" th:text="${department.name}">Department</option>
                            </select>
                        </label>
                        <label class="block space-y-xs">
                            <span class="text-caption font-bold uppercase text-text-secondary">Resource</span>
                            <input name="resourceName" class="w-full rounded-md border border-border-base p-sm text-small" placeholder="e.g. ECG machine, IV fluids" required>
                        </label>
                        <label class="block space-y-xs">
                            <span class="text-caption font-bold uppercase text-text-secondary">Status</span>
                            <select name="status" class="w-full rounded-md border border-border-base p-sm text-small">
                                <option value="AVAILABLE">AVAILABLE</option>
                                <option value="LOW_STOCK">LOW_STOCK</option>
                                <option value="MAINTENANCE">MAINTENANCE</option>
                                <option value="UNAVAILABLE">UNAVAILABLE</option>
                            </select>
                        </label>
                        <label class="block space-y-xs">
                            <span class="text-caption font-bold uppercase text-text-secondary">Note</span>
                            <textarea name="note" class="w-full rounded-md border border-border-base p-sm text-small" rows="4" placeholder="Quantity, reason, expected resolution"></textarea>
                        </label>
                        <button class="w-full rounded-md bg-primary px-md py-sm font-semibold text-white" type="submit">Record Update</button>
                    </div>
                </form>

                <article class="rounded-lg border border-border-base bg-white shadow-sm lg:col-span-2">
                    <div class="border-b border-border-base p-md">
                        <h2 class="text-base font-semibold text-text-primary">Department Resource Notes</h2>
                    </div>
                    <div class="max-h-[calc(100vh-300px)] overflow-auto p-md">
                        <div th:each="department : ${managedDepartments}" class="mb-sm rounded-md bg-surface-muted p-sm">
                            <p class="font-semibold text-text-primary" th:text="${department.name}">Department</p>
                            <p class="whitespace-pre-line text-caption text-text-secondary" th:text="${department.notes ?: 'No resource notes recorded yet.'}">No notes</p>
                        </div>
                    </div>
                </article>
            </section>
        </section>
    </main>
</div>
</body>
</html>
