<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <meta charset="utf-8">
  <title>Payments | Tel Health</title>
</head>
<body>
<div layout:fragment="content" class="flex h-full min-h-0 min-w-0 flex-col md:pl-sidebar-width">
  <main class="flex-1 min-h-0 w-full overflow-y-auto overflow-x-hidden bg-surface-muted px-md py-md md:px-lg">
    <div class="mx-auto flex w-full max-w-[1180px] flex-col gap-md text-small">
      <header class="flex flex-col gap-md md:flex-row md:items-center md:justify-between">
        <div>
          <h1 class="text-[22px] leading-7 font-semibold text-text-primary">Payment Processing</h1>
          <p class="text-small text-text-secondary">Review patient submissions, verify evidence, and confirm payments.</p>
        </div>
        <a th:href="@{/billing/home}" class="rounded-md border border-border-base bg-white px-md py-sm font-semibold text-text-primary">Billing Home</a>
      </header>

      <section class="rounded-lg border border-border-base bg-white shadow-sm">
        <div class="max-h-[calc(100vh-245px)] overflow-auto">
          <table class="w-full min-w-[900px] text-left text-small" data-page-size="12">
            <thead class="sticky top-0 z-10 bg-surface-muted text-[11px] font-bold uppercase text-text-secondary">
            <tr>
              <th class="px-md py-sm">Patient</th>
              <th class="px-md py-sm">Invoice</th>
              <th class="px-md py-sm text-right">Amount</th>
              <th class="px-md py-sm">Submission</th>
              <th class="px-md py-sm">Status</th>
              <th class="px-md py-sm text-right">Action</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-border-base">
            <tr th:if="${#lists.isEmpty(records)}">
              <td colspan="6" class="px-md py-lg text-center text-text-secondary">No payment records.</td>
            </tr>
            <tr th:each="record : ${records}"
                th:with="patient=${patientsById[record.patientId]}, submitted=${#strings.contains(record.status ?: '', 'SUBMITTED')}">
              <td class="px-md py-sm">
                <p class="font-semibold" th:text="${patient != null ? patient.fullName : 'Unknown Patient'}">Patient</p>
                <p class="text-caption text-text-secondary" th:text="${patient != null ? patient.patientId : '-'}">PID</p>
              </td>
              <td class="px-md py-sm">
                <p class="font-semibold" th:text="${record.invoiceNumber ?: ('INV-' + record.id)}">INV</p>
                <p class="text-caption text-text-secondary" th:text="${record.paymentMethod ?: 'No method yet'}">Method</p>
              </td>
              <td class="px-md py-sm text-right">
                <p class="font-semibold" th:text="${#numbers.formatDecimal(record.totalAmount ?: 0, 1, 'COMMA', 2, 'POINT')}">0.00</p>
                <p class="text-caption text-text-secondary" th:if="${record.amountPaid != null}" th:text="${'Submitted: ' + #numbers.formatDecimal(record.amountPaid, 1, 'COMMA', 2, 'POINT')}">Submitted</p>
              </td>
              <td class="px-md py-sm">
                <p th:text="${record.paymentSubmittedAt != null ? #temporals.format(record.paymentSubmittedAt, 'dd MMM yyyy hh:mm a') : '-'}">-</p>
                <p class="text-caption text-text-secondary" th:text="${record.paymentReference ?: 'No reference'}">Reference</p>
              </td>
              <td class="px-md py-sm">
                <span class="rounded-full px-sm py-[2px] text-caption font-bold"
                      th:classappend="${record.status == 'PAID'} ? ' bg-success/10 text-success' : (${submitted} ? ' bg-warning/10 text-warning' : ' bg-danger/10 text-danger')"
                      th:text="${record.status ?: 'UNPAID'}">UNPAID</span>
              </td>
              <td class="px-md py-sm text-right">
                <a th:if="${record.status != 'PAID'}" th:href="@{/billing/payments/{id}(id=${record.id})}" class="rounded-md bg-primary px-sm py-xs text-caption font-bold text-white" th:text="${submitted ? 'Review' : 'Record'}">Review</a>
                <span th:if="${record.status == 'PAID'}" class="text-caption text-success" th:text="${record.paymentMethod ?: 'Paid'}">Paid</span>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>
</div>
</body>
</html>
