<!DOCTYPE html>
<html class="light" lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <meta charset="utf-8">
  <title>Invoices | Tel Health</title>
</head>
<body>
<div layout:fragment="content" class="flex h-full min-h-0 min-w-0 flex-col md:pl-sidebar-width">
  <main class="flex-1 min-h-0 w-full overflow-y-auto overflow-x-hidden px-md py-md md:px-lg">
    <div class="mx-auto flex w-full max-w-[1180px] flex-col gap-md text-small">
      <header class="flex flex-col gap-md md:flex-row md:items-center md:justify-between">
        <div><h1 class="text-[22px] leading-7 font-semibold text-text-primary">Invoices</h1><p class="text-small text-text-secondary">Review generated invoices from clinical services.</p></div>
        <a th:href="@{/billing/home}" class="rounded-md border border-border-base bg-white px-md py-sm font-semibold text-text-primary">Billing Home</a>
      </header>
      <section class="rounded-lg border border-border-base bg-white shadow-sm">
        <div class="border-b border-border-base px-md py-sm"><h2 class="text-base font-semibold text-text-primary">Invoice Register</h2></div>
        <div class="max-h-[calc(100vh-245px)] overflow-auto">
          <table class="w-full text-left text-small" data-page-size="12">
            <thead class="sticky top-0 z-10 bg-surface-muted text-[11px] font-bold uppercase text-text-secondary">
            <tr><th class="px-md py-sm">Invoice</th><th class="px-md py-sm">Patient</th><th class="px-md py-sm">Service</th><th class="px-md py-sm text-right">Amount</th><th class="px-md py-sm">Status</th><th class="px-md py-sm text-right">Action</th></tr>
            </thead>
            <tbody class="divide-y divide-border-base">
            <tr th:if="${#lists.isEmpty(records)}"><td colspan="6" class="px-md py-lg text-center text-text-secondary">No invoices available.</td></tr>
            <tr th:each="record : ${records}" th:with="patient=${patientsById[record.patientId]}">
              <td class="px-md py-sm"><p class="font-semibold" th:text="${record.invoiceNumber ?: ('INV-' + record.id)}">INV</p><p class="text-caption text-text-secondary" th:text="${record.createdAt != null ? #temporals.format(record.createdAt, 'MMM dd, yyyy') : '-'}">Date</p></td>
              <td class="px-md py-sm"><p class="font-semibold" th:text="${patient != null ? patient.fullName : 'Unknown Patient'}">Patient</p><p class="text-caption text-text-secondary" th:text="${patient != null ? patient.patientId : '-'}">PID</p></td>
              <td class="px-md py-sm" th:text="${record.description ?: '-'}">Service</td>
              <td class="px-md py-sm text-right font-semibold" th:text="${#numbers.formatDecimal(record.totalAmount, 1, 'COMMA', 2, 'POINT')}">0.00</td>
              <td class="px-md py-sm"><span class="rounded-full bg-warning/10 px-sm py-1 text-[11px] font-bold text-warning" th:classappend="${record.status == 'PAID'} ? ' bg-success/10 text-success' : ''" th:text="${record.status ?: 'UNPAID'}">UNPAID</span></td>
              <td class="px-md py-sm text-right"><a th:href="@{/billing/invoices/{id}(id=${record.id})}" class="rounded-md border border-primary px-sm py-xs text-caption font-bold text-primary">View</a></td>
            </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>
</div>
</body>
</html>
